<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SC-300 Scenario Exam</title>
<style>
body{margin:0;background:#f4f6fa;font-family:Segoe UI,Arial;color:#172033}header{background:#111827;color:#fff;padding:14px 20px;position:sticky;top:0}.head,main{max-width:1050px;margin:auto}.head{display:flex;justify-content:space-between}.card{background:#fff;border:1px solid #d8e0ea;border-radius:14px;padding:24px;margin:24px 16px;box-shadow:0 5px 18px #0001}.hidden{display:none!important}.btn{border:0;border-radius:8px;padding:10px 15px;font-weight:650;cursor:pointer}.primary{background:#2563eb;color:#fff}.secondary{background:#e7edf6}.danger{background:#b91c1c;color:#fff}.option{display:block;border:1px solid #d8e0ea;border-radius:10px;padding:13px;margin:10px 0;cursor:pointer}.option input{margin-right:10px}.correct{background:#ecfdf5;border-color:#22c55e}.wrong{background:#fef2f2;border-color:#ef4444}.feedback{display:none;padding:14px;border-radius:9px;margin-top:15px}.good{display:block;background:#ecfdf5;color:#166534}.bad{display:block;background:#fef2f2;color:#991b1b}.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.nav{display:grid;grid-template-columns:repeat(9,1fr);gap:7px;margin-top:15px}.nav button{border:1px solid #d8e0ea;background:#fff;border-radius:6px;padding:7px}.answered{background:#dbeafe!important}.flagged{outline:2px solid #d97706}.active{background:#2563eb!important;color:#fff}.progress{height:9px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:16px 0}.progress span{display:block;height:100%;background:#2563eb}.score{font-size:48px;font-weight:800}.meter{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden}.meter span{display:block;height:100%;background:#2563eb}.tip{padding:12px;background:#fff7ed;border-left:4px solid #d97706;margin:10px 0}@media(max-width:650px){.nav{grid-template-columns:repeat(6,1fr)}}
</style></head><body><header><div class="head"><strong>SC-300 Scenario Exam</strong><span id="timer">90:00</span></div></header><main>
<section id="intro" class="card"><h1>SC-300 Interactive Practice Exam</h1><p>36 hard, scenario-based questions with randomized answers, explanations, review flags, and final study recommendations.</p><button id="start" class="btn primary">Start exam</button></section>
<section id="exam" class="card hidden"><small id="domain"></small><h2 id="num"></h2><p id="text"></p><div id="opts"></div><div id="fb" class="feedback"></div><div class="controls"><button id="check" class="btn primary">Check answer</button><button id="flag" class="btn secondary">Mark review</button><button id="prev" class="btn secondary">Previous</button><button id="next" class="btn secondary">Next</button><button id="finish" class="btn danger">Finish exam</button></div><div class="progress"><span id="bar"></span></div><div id="nav" class="nav"></div></section>
<section id="results" class="card hidden"></section></main>
<script>
"use strict";const BANK=[{"domain": "Implement and manage user identities", "type": "single", "q": "Users whose department is Finance must be added to a group automatically and removed when the attribute changes.", "o": ["Assigned security group", "Dynamic user group", "Administrative unit", "Access package"], "a": [1], "e": "Dynamic membership rules evaluate user attributes and update membership automatically.", "r": "Dynamic groups"}, {"domain": "Implement and manage user identities", "type": "single", "q": "HR admins must reset passwords only for HR users, not for users in other departments.", "o": ["Security group", "Administrative unit with a scoped role", "Conditional Access", "Management group"], "a": [1], "e": "Administrative units scope Entra admin roles to a subset of directory objects.", "r": "Administrative units"}, {"domain": "Implement and manage user identities", "type": "multi", "q": "Which TWO are valid uses of Microsoft Entra B2B collaboration?", "o": ["Invite an external consultant with their own identity", "Assign a guest to an enterprise app", "Create Azure availability zones", "Replace Conditional Access", "Patch domain controllers"], "a": [0, 1], "e": "B2B lets external users authenticate with external identities and receive assigned access.", "r": "B2B collaboration"}, {"domain": "Implement and manage user identities", "type": "single", "q": "A deleted user must be restored with the same object where possible.", "o": ["Create a new user with the same UPN", "Restore the deleted user", "Invite the user as a guest", "Run an access review"], "a": [1], "e": "Soft-deleted Entra users can be restored during the retention period.", "r": "User lifecycle"}, {"domain": "Implement and manage user identities", "type": "single", "q": "Cloud sign-in must continue even if on-premises authentication agents are unavailable.", "o": ["Pass-through authentication", "Password hash synchronization", "Federation only", "Certificate-based authentication"], "a": [1], "e": "Password hash synchronization supports cloud authentication without depending on on-premises agents at sign-in.", "r": "Hybrid authentication"}, {"domain": "Implement and manage user identities", "type": "single", "q": "Microsoft Entra ID must validate passwords directly against on-premises AD without storing password hashes in the cloud.", "o": ["Password hash synchronization", "Pass-through authentication", "Seamless SSO only", "Entra Domain Services"], "a": [1], "e": "Pass-through authentication validates credentials through on-premises agents.", "r": "Hybrid authentication"}, {"domain": "Implement and manage user identities", "type": "single", "q": "A department needs a shared mailbox, calendar, SharePoint site, and Teams support.", "o": ["Security group", "Microsoft 365 group", "Administrative unit", "Role-assignable group"], "a": [1], "e": "Microsoft 365 groups provide collaboration resources.", "r": "Group types"}, {"domain": "Implement and manage user identities", "type": "single", "q": "An Entra administrative role must be assigned to a group.", "o": ["Use any dynamic group", "Create a role-assignable security group", "Use a distribution list", "Use an on-premises-only group"], "a": [1], "e": "Only groups created as role-assignable can receive Entra roles.", "r": "Role-assignable groups"}, {"domain": "Implement and manage user identities", "type": "single", "q": "Licenses must be assigned automatically to all members of the Sales group.", "o": ["Group-based licensing", "Administrative units", "Resource locks", "Authentication context"], "a": [0], "e": "Group-based licensing assigns and removes licenses through group membership.", "r": "Group-based licensing"}, {"domain": "Implement authentication and access management", "type": "single", "q": "Users may access Microsoft 365 only from compliant devices.", "o": ["Azure RBAC", "Conditional Access requiring a compliant device", "PIM", "Access reviews"], "a": [1], "e": "Conditional Access grant controls can require device compliance.", "r": "Conditional Access"}, {"domain": "Implement authentication and access management", "type": "single", "q": "Admins must use phishing-resistant authentication to access the Azure portal.", "o": ["Named location", "Authentication strength", "Sign-in frequency", "Terms of use"], "a": [1], "e": "Authentication strengths can require phishing-resistant MFA methods.", "r": "Authentication strengths"}, {"domain": "Implement authentication and access management", "type": "single", "q": "A new Conditional Access policy must be evaluated without enforcement.", "o": ["On", "Off", "Report-only", "Audit"], "a": [2], "e": "Report-only evaluates a policy without enforcing it.", "r": "Conditional Access"}, {"domain": "Implement authentication and access management", "type": "multi", "q": "Which TWO are Conditional Access risk conditions?", "o": ["User risk", "Sign-in risk", "Resource tags", "Budget status", "Resource locks"], "a": [0, 1], "e": "Conditional Access can evaluate user risk and sign-in risk.", "r": "Identity Protection"}, {"domain": "Implement authentication and access management", "type": "single", "q": "Leaked credentials are detected for a user.", "o": ["Device risk", "User risk", "Application risk", "Resource risk"], "a": [1], "e": "Leaked credentials indicate the identity itself may be compromised.", "r": "Identity Protection"}, {"domain": "Implement authentication and access management", "type": "single", "q": "Users must reset their own forgotten passwords after verification.", "o": ["Password Administrator", "SSPR", "PIM", "Access reviews"], "a": [1], "e": "SSPR lets users reset their own passwords.", "r": "SSPR"}, {"domain": "Implement authentication and access management", "type": "single", "q": "A hybrid user's SSPR change must update on-premises AD.", "o": ["Password writeback", "Password hash sync only", "Seamless SSO", "Cross-tenant sync"], "a": [0], "e": "Password writeback sends cloud password changes to on-premises AD.", "r": "Password writeback"}, {"domain": "Implement authentication and access management", "type": "single", "q": "The company wants phishing-resistant passwordless authentication using physical keys.", "o": ["SMS", "FIDO2 security keys", "Security questions", "Email OTP"], "a": [1], "e": "FIDO2 keys provide passwordless, phishing-resistant authentication.", "r": "Passwordless authentication"}, {"domain": "Implement authentication and access management", "type": "single", "q": "MFA must be required only when an eligible admin activates a privileged role.", "o": ["Conditional Access for all apps", "PIM activation settings", "SSPR", "Access reviews"], "a": [1], "e": "PIM activation settings can require MFA specifically during activation.", "r": "PIM"}, {"domain": "Implement authentication and access management", "type": "single", "q": "A user must create and delete Azure VMs but cannot assign access.", "o": ["Reader", "Contributor", "Owner", "User Access Administrator"], "a": [1], "e": "Contributor manages resources but cannot assign Azure RBAC roles.", "r": "Azure RBAC"}, {"domain": "Implement authentication and access management", "type": "single", "q": "A user must assign Azure RBAC roles but should not manage resources.", "o": ["Contributor", "Reader", "User Access Administrator", "Security Reader"], "a": [2], "e": "User Access Administrator manages access assignments.", "r": "Azure RBAC"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "Developers are building a new app that will authenticate users with Entra ID.", "o": ["Enterprise application only", "App registration", "Administrative unit", "Access package"], "a": [1], "e": "An app registration defines the application's identity and permissions.", "r": "App registrations"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "Salesforce is added from the gallery and users must be assigned for SSO.", "o": ["Enterprise application service principal", "Managed identity", "Administrative unit", "Resource group"], "a": [0], "e": "The enterprise application is the tenant service principal used for SSO and assignment.", "r": "Enterprise applications"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "An Azure VM must access Key Vault without stored credentials.", "o": ["Guest account", "Managed identity", "Shared user account", "Emergency account"], "a": [1], "e": "Managed identities provide Azure resources with automatically managed identities.", "r": "Managed identities"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "Multiple Azure resources must share one identity.", "o": ["System-assigned managed identity", "User-assigned managed identity", "Guest identity", "Federated user"], "a": [1], "e": "A user-assigned managed identity can be attached to multiple resources.", "r": "Managed identities"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "A confidential app needs a credential more secure than a client secret.", "o": ["Certificate credential", "User password", "SMS code", "Security question"], "a": [0], "e": "Certificates are stronger app credentials than shared secrets.", "r": "Application credentials"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "An app calls Microsoft Graph as the signed-in user.", "o": ["Application permissions", "Delegated permissions", "Azure RBAC", "PIM permissions"], "a": [1], "e": "Delegated permissions act on behalf of a signed-in user.", "r": "API permissions"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "A background daemon calls Microsoft Graph without a signed-in user.", "o": ["Delegated permissions", "Application permissions", "User consent only", "Authentication strength"], "a": [1], "e": "Application permissions are used by daemon or service apps.", "r": "API permissions"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "A high-privilege Graph permission cannot be approved by users.", "o": ["Any member can approve", "An admin must grant consent", "The app approves itself", "A resource owner approves"], "a": [1], "e": "Permissions requiring admin consent must be approved by an authorized administrator.", "r": "Consent"}, {"domain": "Plan and implement workload identities", "type": "single", "q": "An app must accept users from any Entra organization.", "o": ["Single-tenant accounts only", "Accounts in any organizational directory", "Personal accounts only", "Managed identities only"], "a": [1], "e": "This creates a multitenant application.", "r": "App tenancy"}, {"domain": "Plan and implement identity governance", "type": "single", "q": "Global Admin access must require approval and expire after two hours.", "o": ["Conditional Access", "PIM", "Access reviews", "Entitlement management"], "a": [1], "e": "PIM provides just-in-time, time-bound privileged role activation.", "r": "PIM"}, {"domain": "Plan and implement identity governance", "type": "single", "q": "Managers must verify every six months who still needs Finance app access.", "o": ["Access reviews", "Conditional Access", "Authentication strengths", "Password protection"], "a": [0], "e": "Access reviews periodically validate existing access.", "r": "Access reviews"}, {"domain": "Plan and implement identity governance", "type": "single", "q": "Contractors request Teams, SharePoint, and app access with manager approval and 90-day expiration.", "o": ["Entitlement management access package", "Azure RBAC only", "Administrative unit", "Resource lock"], "a": [0], "e": "Access packages bundle resources and support request, approval, and expiration policies.", "r": "Entitlement management"}, {"domain": "Plan and implement identity governance", "type": "single", "q": "Joiner, mover, and leaver tasks must be automated from HR-driven events.", "o": ["Lifecycle Workflows", "Azure Policy", "Access reviews only", "Defender for Cloud"], "a": [0], "e": "Lifecycle Workflows automate joiner-mover-leaver identity tasks.", "r": "Lifecycle Workflows"}, {"domain": "Plan and implement identity governance", "type": "single", "q": "A user is eligible for an Entra role in PIM. What must happen before permissions are received?", "o": ["Activate the role", "Run password sync", "Create an access package", "Register an app"], "a": [0], "e": "Eligible assignments require activation.", "r": "PIM"}, {"domain": "Plan and implement identity governance", "type": "single", "q": "A privileged role assignment starts Monday and ends after 30 days.", "o": ["Permanent active assignment", "Time-bound assignment", "Dynamic membership rule", "Session control"], "a": [1], "e": "PIM supports time-bound eligible or active assignments.", "r": "PIM"}, {"domain": "Plan and implement identity governance", "type": "single", "q": "Users who do not respond to an access review must automatically lose access.", "o": ["Apply results automatically and remove non-responders", "Require MFA", "Enable writeback", "Use report-only"], "a": [0], "e": "Access reviews can automatically apply decisions and remove non-responders.", "r": "Access reviews"}];let qs=[],i=0,ans={},done={},flags={},left=5400,timer=null,submitted=false;
function sh(a){const b=a.slice();for(let x=b.length-1;x>0;x--){const y=Math.floor(Math.random()*(x+1));[b[x],b[y]]=[b[y],b[x]]}return b}
function eq(a,b){return a.slice().sort().join(",")===b.slice().sort().join(",")}
function prep(){qs=sh(BANK).map(q=>{const p=q.o.map((t,n)=>({t,n})),m=sh(p),a=[];m.forEach((x,n)=>{if(q.a.includes(x.n))a.push(n)});return{...q,o:m.map(x=>x.t),a:a}})}
function start(){prep();intro.classList.add("hidden");exam.classList.remove("hidden");render();timer=setInterval(()=>{left--;timerEl.textContent=Math.floor(left/60)+":"+String(left%60).padStart(2,"0");if(left<=0)submit(true)},1000)}
function save(){ans[i]=Array.from(document.querySelectorAll('#opts input:checked')).map(x=>+x.value)}
function render(){const q=qs[i];domain.textContent=q.domain+(q.type==="multi"?" • Select TWO":" • Select one");num.textContent="Question "+(i+1)+" of "+qs.length;text.textContent=q.q;opts.innerHTML="";q.o.forEach((t,n)=>{const l=document.createElement("label");l.className="option";const x=document.createElement("input");x.type=q.type==="multi"?"checkbox":"radio";x.name="a";x.value=n;x.checked=(ans[i]||[]).includes(n);x.disabled=!!done[i];x.onchange=save;l.append(x,document.createTextNode(t));opts.append(l)});fb.className="feedback";fb.innerHTML="";if(done[i])feedback();check.disabled=!!done[i];prev.disabled=i===0;next.disabled=i===qs.length-1;bar.style.width=((i+1)/qs.length*100)+"%";navRender()}
function checkIt(){save();const a=ans[i]||[];if(!a.length)return alert("Select an answer.");if(qs[i].type==="multi"&&a.length!==2)return alert("Select exactly TWO.");done[i]=1;render()}
function feedback(){const q=qs[i],a=ans[i]||[],ok=eq(a,q.a);document.querySelectorAll(".option").forEach((l,n)=>{if(q.a.includes(n))l.classList.add("correct");if(a.includes(n)&&!q.a.includes(n))l.classList.add("wrong")});fb.className="feedback "+(ok?"good":"bad");fb.innerHTML="<b>"+(ok?"Correct":"Incorrect")+"</b><br>"+q.e+"<br><br><b>Correct:</b> "+q.a.map(n=>q.o[n]).join("; ")}
function move(d){save();if(i+d>=0&&i+d<qs.length){i+=d;render()}}
function navRender(){nav.innerHTML="";qs.forEach((q,n)=>{const b=document.createElement("button");b.textContent=n+1;if((ans[n]||[]).length)b.classList.add("answered");if(flags[n])b.classList.add("flagged");if(n===i)b.classList.add("active");b.onclick=()=>{save();i=n;render()};nav.append(b)})}
function submit(auto){if(submitted)return;save();const u=qs.filter((q,n)=>!(ans[n]||[]).length).length;if(!auto&&!confirm(u?`You have ${u} unanswered. Submit anyway?`:"Submit exam?"))return;submitted=true;clearInterval(timer);exam.classList.add("hidden");results.classList.remove("hidden");show()}
function show(){let right=0,ds={},topics={};qs.forEach((q,n)=>{const ok=eq(ans[n]||[],q.a);if(ok)right++;ds[q.domain]??={r:0,t:0};ds[q.domain].t++;if(ok)ds[q.domain].r++;else topics[q.r]=(topics[q.r]||0)+1});const pct=Math.round(right/qs.length*100);let h=`<h1>Results</h1><div class="score">${pct}%</div><p><b>${right}</b> of <b>${qs.length}</b> correct.</p><h3>Domains</h3>`;Object.entries(ds).forEach(([d,s])=>{const p=Math.round(s.r/s.t*100);h+=`<p><b>${d}: ${p}% (${s.r}/${s.t})</b></p><div class="meter"><span style="width:${p}%"></span></div>`});h+="<h3>Study priorities</h3>";Object.entries(topics).sort((a,b)=>b[1]-a[1]).slice(0,8).forEach(([t,c])=>h+=`<div class="tip"><b>${t}</b>: ${c} missed.</div>`);h+="<h3>Missed questions</h3>";qs.forEach((q,n)=>{if(!eq(ans[n]||[],q.a)){const ua=(ans[n]||[]).length?ans[n].map(x=>q.o[x]).join("; "):"No answer";h+=`<details><summary>Question ${n+1}: ${q.q}</summary><p><b>Your answer:</b> ${ua}</p><p><b>Correct:</b> ${q.a.map(x=>q.o[x]).join("; ")}</p><p>${q.e}</p></details>`}});h+='<p><button class="btn primary" onclick="location.reload()">New attempt</button></p>';results.innerHTML=h}
const intro=document.getElementById("intro"),exam=document.getElementById("exam"),results=document.getElementById("results"),domain=document.getElementById("domain"),num=document.getElementById("num"),text=document.getElementById("text"),opts=document.getElementById("opts"),fb=document.getElementById("fb"),check=document.getElementById("check"),prev=document.getElementById("prev"),next=document.getElementById("next"),bar=document.getElementById("bar"),nav=document.getElementById("nav"),timerEl=document.getElementById("timer");
document.getElementById("start").onclick=start;check.onclick=checkIt;document.getElementById("flag").onclick=()=>{flags[i]=!flags[i];navRender()};prev.onclick=()=>move(-1);next.onclick=()=>move(1);document.getElementById("finish").onclick=()=>submit(false);
</script></body></html>
